<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Your Invitation</title>
</head>
<body style="margin: 0; padding: 0; background-color: #09090B; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #09090B; padding: 40px 0;">
        <tr>
            <td align="center">
                <!-- Outer Card -->
                <table border="0" cellpadding="0" cellspacing="0" width="500" style="background-color: #18181B; border: 1px solid #27272A; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    
                    <!-- Decorative Top Accent Line -->
                    <tr>
                        <td height="4" style="background-color: #F97316; font-size: 0; line-height: 0;">&nbsp;</td>
                    </tr>

                    <!-- Content Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <!-- Brand -->
                                        <span style="font-size: 28px; font-weight: 900; font-style: italic; letter-spacing: -1.5px; color: #FAFAFA; font-family: sans-serif; display: inline-block;">
                                            VROOQ<span style="color: #F97316;">.</span>
                                        </span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Body Content -->
                    <tr>
                        <td style="padding: 20px 40px; text-align: center;">
                            <h1 style="color: #FAFAFA; font-size: 24px; font-weight: 900; margin: 0 0 16px 0; text-transform: uppercase; font-style: italic; letter-spacing: -0.5px;">
                                Join the Pit Crew
                            </h1>
                            <p style="color: #A1A1AA; font-size: 14px; line-height: 22px; font-weight: 500; margin: 0 0 32px 0;">
                                You have been invited to join the VROOQ team. Accept the invitation below to set up your credentials and access the command center.
                            </p>

                            <!-- Button wrapper -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <a href="{{ .ConfirmationURL }}" style="display: inline-block; padding: 14px 32px; background-color: #F97316; color: #FFFFFF; font-size: 14px; font-weight: 700; text-decoration: none; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);">
                                            Accept Invitation →
                                        </a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Footer Details -->
                    <tr>
                        <td style="padding: 40px; text-align: center; border-top: 1px solid #27272A; background-color: #0F0F11;">
                            <p style="color: #52525B; font-size: 11px; line-height: 16px; font-weight: 600; margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px;">
                                Security Check
                            </p>
                            <p style="color: #52525B; font-size: 11px; line-height: 16px; margin: 0;">
                                If you were not expecting an invitation to join Vrooq, you can safely ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
